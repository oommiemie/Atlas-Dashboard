# line-uxpert-bot — deploy ด้วย `npx wrangler deploy` (หรือ copy code ไปวางใน dashboard ก็ได้)
name = "line-uxpert-bot"
main = "worker.js"
compatibility_date = "2026-01-01"

# 10:15 UTC = 17:15 เวลาไทย (ICT, UTC+7) — เตือนอัปเดต Blog + Taiga
[triggers]
crons = ["15 10 * * *"]

# KV สำหรับความจำแชท + โหมดรูป — ใส่ id ของ namespace จริง
# สร้างด้วย: npx wrangler kv namespace create BOT_KV
[[kv_namespaces]]
binding = "BOT_KV"
id = "ใส่_KV_NAMESPACE_ID_ตรงนี้"

# secrets ตั้งผ่าน dashboard หรือ `npx wrangler secret put <NAME>`:
#   GROQ_API_KEY, GEMINI_API_KEY, LINE_TOKEN, LINE_SECRET, LINE_GROUP_ID
